version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: unifize
      POSTGRES_PASSWORD: unifize
      POSTGRES_DB: unifize
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unifize"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://unifize:unifize@db:5432/unifize
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: python -m app.workers.ingestion_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://unifize:unifize@db:5432/unifize
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
