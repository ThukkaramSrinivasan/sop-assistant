[alembic]
# Path to migration scripts
script_location = alembic

# Prepend project root to sys.path so app.* imports work inside env.py
prepend_sys_path = .

# Version path separator; default is os-specific
version_path_separator = os

# sqlalchemy.url is intentionally left blank.
# env.py reads the URL from app.core.config.settings at runtime.
sqlalchemy.url =

[post_write_hooks]
# (none configured)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
